<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Exit</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            /* Cascading Navy Retro Theme */
            background: linear-gradient(180deg, #000044 0%, #000022 50%, #000000 100%);
            background-attachment: fixed;
            color: #00ffff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-shadow: 2px 2px #ff00ff;
        }

        h1 {
            margin-top: 20px;
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            gap: 6px;
            border: 4px solid #00ffff;
            padding: 12px;
            background-color: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 25px #ff00ff, inset 0 0 10px #00ffff;
            margin-bottom: 20px;
        }

        .tile {
            width: 60px;
            height: 60px;
            background-color: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        .tile-number {
            font-size: 10px;
            color: rgba(0, 255, 255, 0.4);
            text-shadow: none; /* Keep the number clean and subtle */
        }

        /* CRT Scanline effect */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <script>
        // Poll the server every 2 seconds for new images
        setTimeout(function(){
           location.reload();
        }, 2000);
    </script>
</head>
<body>

    <h1>Hidden Exit</h1>

    <div class="grid-container">
        {% for image in tiles %}
            <div class="tile">
                {% if image %}
                    <img src="/images/{{ image }}" alt="tile">
                {% else %}
                    <span class="tile-number">{{ loop.index }}</span>
                {% endif %}
            </div>
        {% endfor %}
    </div>

</body>
</html>
